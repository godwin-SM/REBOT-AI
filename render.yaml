services:
  - type: web
    name: rebot-ai
    runtime: python
    pythonVersion: "3.12"
    buildCommand: "pip install --no-cache-dir -r requirements.txt"
    startCommand: "uvicorn app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHONOPTIMIZE
        value: "2"
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
    healthCheckPath: /health
    healthCheckStartupTimeout: 120
