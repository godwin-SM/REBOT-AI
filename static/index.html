<!DOCTYPE html>
<html>

<head>

<title>REBOT AI</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#111111">

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
display:flex;
flex-direction:column;
height:100vh;
}

h2{
text-align:center;
background:#1a1a1a;
padding:12px;
margin:0;
}

#top-bar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:#1a1a1a;
}

#chat{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
}

.message{
max-width:70%;
padding:10px 14px;
border-radius:12px;
margin-bottom:10px;
word-wrap:break-word;
}

.user{
background:#00ffcc;
color:black;
margin-left:auto;
}

.bot{
background:#2a2a2a;
color:white;
margin-right:auto;
}

#input-area{
display:flex;
padding:10px;
background:#1a1a1a;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:6px;
margin-right:10px;
font-size:16px;
}

button{
padding:12px 18px;
border:none;
background:#00ffcc;
color:black;
font-weight:bold;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#00ccaa;
}

.clear-btn{
background:#ff5555;
color:white;
padding:8px 12px;
font-size:14px;
}

.clear-btn:hover{
background:#ff2222;
}

@media (min-width:768px){

#chat{
max-width:700px;
margin:auto;
width:100%;
}

#input-area{
max-width:700px;
margin:auto;
width:100%;
}

#top-bar{
max-width:700px;
margin:auto;
width:100%;
}

}

/* ---------- LOADING SCREEN ---------- */

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#111;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

#loader img{
width:120px;
animation:spin 3s linear infinite;
}

#loader h1{
margin-top:20px;
color:#00ffcc;
letter-spacing:3px;
}

#loader p{
color:#aaa;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>

</head>

<script>
if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("/static/sw.js")
.then(function() {
console.log("Service Worker Registered");
});
}
</script>

<body>

<!-- Loading Screen -->
<div id="loader">
<img src="/static/icon.png">
<h1>REBOT AI</h1>
<p>Initializing AI...</p>
</div>

<h2>🤖 REBOT AI</h2>

<div id="top-bar">
<div>Chat with AI</div>
<button class="clear-btn" onclick="clearChat()">Clear Chat</button>
</div>

<div id="chat"></div>

<!-- File Upload -->
<div style="text-align:center; padding:10px;">
<input type="file" id="fileUpload">
<button onclick="uploadFile()">Upload</button>
</div>

<div id="input-area">
<input id="msg" placeholder="Ask REBOT...">
<button onclick="send()">Send</button>
</div>

<script src="/static/script.js"></script>

<script>

/* Hide loader after page loads */

window.addEventListener("load",function(){

setTimeout(function(){

document.getElementById("loader").style.opacity="0";

setTimeout(function(){
document.getElementById("loader").style.display="none";
},500);

},2000);

});

</script>

</body>

</html>
