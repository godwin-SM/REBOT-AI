<!DOCTYPE html>
<html>

<head>

<title>REBOT AI</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#111111">

<!-- Google Sign-In Library -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
display:flex;
flex-direction:column;
height:100vh;
}

h2{
text-align:center;
background:#1a1a1a;
padding:12px;
margin:0;
}

#top-bar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:#1a1a1a;
}

#user-info{
display:flex;
align-items:center;
gap:10px;
}

#user-avatar{
width:40px;
height:40px;
border-radius:50%;
object-fit:cover;
background:#333;
border:2px solid #00ffcc;
display:block;
flex-shrink:0;
}

#chat{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
}

.message{
max-width:70%;
padding:10px 14px;
border-radius:12px;
margin-bottom:10px;
word-wrap:break-word;
}

.user{
background:#00ffcc;
color:black;
margin-left:auto;
}

.bot{
background:#2a2a2a;
color:white;
margin-right:auto;
}

#input-area{
display:flex;
padding:10px;
background:#1a1a1a;
}

input[type="text"]{
flex:1;
padding:12px;
border:none;
border-radius:6px;
margin-right:10px;
font-size:16px;
}

input[type="file"]{
padding:6px;
}

button{
padding:12px 18px;
border:none;
background:#00ffcc;
color:black;
font-weight:bold;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#00ccaa;
}

.logout-btn{
background:#ff5555;
color:white;
padding:8px 12px;
font-size:14px;
}

.logout-btn:hover{
background:#ff2222;
}

/* LOGIN MODAL */

.modal{
display:none;
position:fixed;
z-index:1000;
left:0;
top:0;
width:100%;
height:100%;
background-color:rgba(0,0,0,0.8);
}

.modal.active{
display:flex;
align-items:center;
justify-content:center;
}

.modal-content{
background:#1a1a1a;
padding:40px;
border-radius:12px;
width:90%;
max-width:450px;
box-shadow:0 4px 6px rgba(0,0,0,0.3);
text-align:center;
}

.modal-content h2{
text-align:center;
margin-top:0;
background:none;
padding:0;
color:#00ffcc;
font-size:32px;
margin-bottom:10px;
}

.modal-content p{
text-align:center;
color:#aaa;
margin-bottom:30px;
font-size:16px;
}

#googleSignInButton{
display:flex;
justify-content:center;
margin-bottom:20px;
}

.loading-spinner{
display:inline-block;
width:20px;
height:20px;
border:3px solid #aaa;
border-top:3px solid #00ffcc;
border-radius:50%;
animation:spin 1s linear infinite;
margin-right:10px;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

#main-content{
display:none;
flex:1;
overflow:hidden;
display:flex;
flex-direction:column;
}

#main-content.active{
display:flex;
}

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#111;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

#loader h1{
color:#00ffcc;
letter-spacing:3px;
font-size:36px;
margin:0;
}

#loader p{
color:#aaa;
margin-top:10px;
}

@media (min-width:768px){

#chat{
max-width:700px;
margin:auto;
width:100%;
}

#input-area{
max-width:700px;
margin:auto;
width:100%;
}

#top-bar{
max-width:700px;
margin:auto;
width:100%;
}

}

</style>

</head>

<script>
if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("/static/sw.js")
.then(function() {
console.log("Service Worker Registered");
});
}
</script>

<body>

<!-- Loading Screen -->
<div id="loader">
<h1>🤖 REBOT AI</h1>
<p>Initializing...</p>
</div>

<!-- Login Modal -->
<div id="authModal" class="modal active">
<div class="modal-content">
<h2>🤖 REBOT AI</h2>
<p>Sign in with your Google account to continue</p>

<div id="googleSignInButton">
<!-- Google Sign-In button will be rendered here -->
</div>

<p style="color:#888; font-size:12px; margin-top:20px;">
Your data is private and secure. We only use your Google account for authentication.
</p>
</div>
</div>

<!-- Main Chat Content -->
<div id="main-content">
<h2>🤖 REBOT AI</h2>

<div id="top-bar">
<div id="user-info">
<img id="user-avatar" src="" alt="Avatar" crossorigin="anonymous" referrerpolicy="no-referrer">
<div>
<div id="userName" style="color:#00ffcc; font-weight:bold;">User</div>
<div id="userEmail" style="color:#aaa; font-size:12px;">user@example.com</div>
</div>
</div>
<div>
<button class="logout-btn" onclick="handleLogout()">Sign Out</button>
</div>
</div>

<div id="chat"></div>

<!-- File Upload -->
<div style="text-align:center; padding:10px; background:#1a1a1a;">
<input type="file" id="fileUpload" accept=".pdf,.txt,.docx">
<button onclick="uploadFile()" style="margin-left:5px;">Upload Document</button>
</div>

<div id="input-area">
<input type="text" id="msg" placeholder="Ask REBOT about your documents...">
<button onclick="send()">Send</button>
</div>

</div>

<script src="/static/script.js"></script>

</body>

</html>
